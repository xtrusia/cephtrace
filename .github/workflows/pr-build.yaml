name: Build on Pull Request

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ubuntu:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-latest]
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure submodules are updated
        run: |
            sudo apt-get update
            sudo apt-get install g++ clang libelf-dev libc6-dev-i386 libdw-dev python3

      - name: Run Makefile build
        run: make -j all

      - name: Unit test - verify dwarf output is consistent
        run: ./tests/dwarf-compare.sh

      - name: Uninstall pre-installed Ceph packages
        run: |
          # Remove any pre-installed Ceph packages that might conflict with MicroCeph
          sudo apt-get remove --purge -y ceph ceph-common ceph-osd python3-ceph-argparse python3-ceph-common 'ceph-libboost*' || true
          sudo apt-get autoremove -y || true

      - name: Functional test - verify osdtrace and radostrace with MicroCeph
        run: sudo ./tests/functional-test-microceph.sh

      - name: Embedded DWARF data test - verify integrity and E2E
        run: sudo ./tests/functional-test-embedded-dwarf.sh

      - name: Functional test - radostrace tracing a qemu VM on an RBD disk
        run: sudo ./tests/functional-test-qemu-rbd.sh

  # 26.04 ships ceph-osd as baseline amd64 and an amd64v3 variant; the hosted
  # runner opts the latter in by default.  Run dwarf-compare against each,
  # forcing the variant via the apt config (the -o override does not work) and
  # asserting the resolved .deb so a wrong variant fails loudly instead of
  # comparing against the wrong reference.
  dwarf-compare-ubuntu-2604:
    name: build-ubuntu-cephadm (ubuntu-26.04, ${{ matrix.release }}, ${{ matrix.variant }})
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        release: [tentacle]
        variant: [baseline, amd64v3]
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y g++ clang libelf-dev libc6-dev-i386 libdw-dev python3

      - name: Run Makefile build
        run: make -j all

      - name: Select ceph architecture variant and assert
        run: |
            if [ "${{ matrix.variant }}" = amd64v3 ]; then
                echo 'APT::Architecture-Variants "amd64v3";' | \
                    sudo tee /etc/apt/apt.conf.d/99cephtrace-variant
                expect=_amd64v3.deb
            else
                # Drop the runner image's amd64v3 opt-in -> baseline amd64.
                sudo grep -rl 'Architecture-Variants' /etc/apt/ 2>/dev/null | \
                    sudo xargs -r rm -f
                expect=_amd64.deb
            fi
            sudo apt-get update
            got=$(apt-get install --print-uris -y ceph-osd | \
                  grep -oE '_amd64(v3)?\.deb' | head -1)
            echo "variant=${{ matrix.variant }} expect=$expect got=$got"
            [ "$got" = "$expect" ] || { echo "::error::ceph-osd resolved to $got, expected $expect for ${{ matrix.variant }}"; exit 1; }

      - name: Unit test - verify dwarf output is consistent (${{ matrix.variant }})
        run: ./tests/dwarf-compare.sh

  build-ubuntu-cephadm:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        release: [quincy, reef, squid, tentacle]
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y g++ clang libelf-dev libc6-dev-i386 libdw-dev python3

      - name: Run Makefile build
        run: make -j all

      - name: Functional test - cephadm + radosgw (${{ matrix.release }})
        # The script provisions a single-host cephadm cluster (1 MON+MGR,
        # 3 LVM-wrapped loopback OSDs, 1 radosgw), drives S3 traffic, then
        # traces both the radosgw and one OSD with the matching embedded
        # DWARF data.  Self-contained: installs podman/s3cmd/lvm2 itself.
        run: sudo ./tests/functional-test-cephadm-rgw.sh ${{ matrix.release }}

      # The functional test's cleanup() trap only dumps the last 50 lines of
      # each trace log into the runner's stdout, then unlinks the files.  On
      # failure we want the *full* logs to diagnose the offending event (e.g.
      # an underflowed op_lat value pinpointed by the verifier).  Stage them
      # into the workspace under a release-tagged dir, then upload as a
      # per-cell artifact retained for two weeks.
      - name: Stage trace logs for failure artifact
        if: failure()
        run: |
            mkdir -p trace-logs
            for f in /tmp/osdtrace-cephadm-${{ matrix.release }}.log \
                     /tmp/radostrace-cephadm-${{ matrix.release }}.log \
                     /tmp/s3-workload-${{ matrix.release }}.log; do
                [ -e "$f" ] && sudo cp "$f" trace-logs/ || true
            done
            sudo chown -R "$USER" trace-logs

      - name: Upload trace logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trace-logs-${{ matrix.os }}-${{ matrix.release }}
          path: trace-logs/
          retention-days: 14
          if-no-files-found: ignore

  build-ubuntu-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y g++ clang libelf-dev libdw-dev python3

      - name: Run Makefile build
        run: make -j all

  build-centos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        centos-version: ['9']
    container:
      image: quay.io/centos/centos:stream${{ matrix.centos-version }}
    steps:
      - name: Install dependencies
        run: |
          dnf install -y git gcc gcc-c++ clang make elfutils-libelf-devel elfutils-devel glibc-devel glibc-devel.i686 python3 openssl-devel

      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/cephtrace/cephtrace

      - name: Run Makefile build
        run: make -j radostrace osdtrace

      - name: Unit test - verify dwarf output is consistent
        run: ./tests/dwarf-compare-centos.sh

  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install dependencies
        run: |
          dnf install -y git gcc gcc-c++ clang make elfutils-libelf-devel elfutils-devel glibc-devel glibc-devel.i686 python3 openssl-devel

      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/cephtrace/cephtrace

      - name: Run Makefile build
        run: make -j radostrace osdtrace

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang clang-tidy libelf-dev libc6-dev-i386 libdw-dev

      - name: Run clang-tidy
        run: make -j clang-tidy
