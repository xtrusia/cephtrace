name: Refresh embedded DWARF for new Ceph releases

# Scheduled caller: picks up only point releases NEWER than what we already
# embed (per major), so it doesn't churn on the historical backlog.  Backfill
# of older missing versions is a separate, manual workflow
# (backfill-embedded-dwarf.yaml).  All the heavy lifting lives in the shared
# reusable workflow.

on:
  schedule:
    # Daily at 18:30 Japan time (JST = UTC+9, no DST) -> 09:30 UTC.
    - cron: '30 9 * * *'
  workflow_dispatch:    # also runnable on demand from the Actions UI

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    uses: ./.github/workflows/embedded-dwarf-refresh-reusable.yaml
    with:
      new_only: true
